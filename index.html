<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC SALCAMAR — Официальный сайт клуба</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', 'Segoe UI', sans-serif; }
        body { background-color: #060606; color: #fff; text-align: center; padding: 15px; padding-bottom: 40px; }
        
        header { 
            background: linear-gradient(135deg, #111 0%, #1c1c1c 100%); 
            padding: 50px 20px; border-radius: 24px; margin-bottom: 30px; 
            border: 2px solid #d4af37; position: relative; overflow: hidden;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        
        .logo {
            width: 170px; height: 170px; border-radius: 50%; border: 4px solid #d4af37;
            margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 2.8rem; color: #d4af37; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }
        .location { font-size: 1.1rem; color: #b3b3b3; margin-top: 10px; font-style: italic; }
        
        .motto-box { 
            background: #111; border-left: 6px solid #d4af37; padding: 22px; margin: 30px 0; 
            border-radius: 12px; font-size: 1.3rem; font-weight: 700; font-style: italic; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        .motto-sub { display: block; font-size: 1.05rem; color: #ff3333; margin-top: 10px; text-transform: uppercase; font-weight: 800; font-style: normal; }
        
        .match-btn {
            display: inline-block; background: linear-gradient(135deg, #d4af37 0%, #b89218 100%);
            color: #000; padding: 16px 40px; font-size: 1.15rem; font-weight: 800; text-transform: uppercase; 
            text-decoration: none; border-radius: 50px; margin: 10px 0 35px; box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }

        h2 { font-size: 1.9rem; color: #d4af37; margin: 50px 0 25px; border-bottom: 2px solid #d4af37; padding-bottom: 12px; text-transform: uppercase; font-weight: 800; }
        
        .container-box { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .card-item { background: #111; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; padding: 20px; width: 45%; min-width: 160px; text-align: left; }
        .card-item-center { text-align: center; }
        .card-title { font-size: 1.1rem; color: #d4af37; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .card-text { font-size: 0.95rem; color: #fff; margin-bottom: 8px; font-weight: 600; }
        .card-text span { color: #aaa; font-weight: 500; }

        .derby-summary { background: #141414; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; display: flex; justify-content: space-around; }
        .derby-val { font-size: 1.8rem; font-weight: 900; color: #d4af37; }
        .derby-lbl { font-size: 0.85rem; color: #888; text-transform: uppercase; }

        .info-table-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 15px; text-align: left; margin: 20px auto; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .info-table-row { display: flex; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid #1f1f1f; font-size: 0.95rem; align-items: center; }
        .info-table-row:last-child { border-bottom: none; }
        .info-table-label { font-weight: 700; color: #fff; }
        
        .med-status { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px; }
        .status-ready { background: rgba(0, 255, 102, 0.15); color: #00ff66; border: 1px solid rgba(0, 255, 102, 0.3); }
        .status-unstable { background: rgba(255, 153, 0, 0.15); color: #ff9900; border: 1px solid rgba(255, 153, 0, 0.3); }

        .stats-table { width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .stats-table th { background: #1c1c1c; color: #d4af37; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; padding: 12px; text-align: left; }
        .stats-table td { padding: 12px; text-align: left; font-size: 0.95rem; border-bottom: 1px solid #1f1f1f; color: #fff; font-weight: 600; }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table .num-col { color: #d4af37; font-family: monospace; font-weight: 700; }

        /* ТАКТИЧЕСКОЕ ПОЛЕ */
        .pitch-container {
            width: 100%; max-width: 360px; height: 500px; background-color: #1b4d22;
            margin: 20px auto; border: 4px solid #fff; border-radius: 12px;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            background-image: repeating-linear-gradient(to bottom, #1b4d22, #1b4d22 40px, #14401a 40px, #14401a 80px);
            overflow: hidden;
        }
        .pitch-center-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.6); }
        .pitch-center-circle { position: absolute; top: 50%; left: 50%; width: 90px; height: 90px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .pitch-penalty-top { position: absolute; top: 0; left: 50%; width: 160px; height: 70px; border: 2px solid rgba(255,255,255,0.6); border-top: none; transform: translateX(-50%); }
        .pitch-penalty-bot { position: absolute; bottom: 0; left: 50%; width: 160px; height: 70px; border: 2px solid rgba(255,255,255,0.6); border-bottom: none; transform: translateX(-50%); }
        
        .pitch-player { position: absolute; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .pitch-dot { width: 34px; height: 34px; border-radius: 50%; background: #000; border: 2px solid #d4af37; color: #d4af37; font-weight: 900; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; }
        .pitch-pname { color: #fff; font-size: 0.75rem; font-weight: 700; margin-top: 4px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; white-space: nowrap; border: 1px solid #333; }

        /* ИГРОВЫЕ КАРТОЧКИ С РЕЙТИНГОМ */
        .position-title { font-size: 1.4rem; color: #d4af37; margin-top: 40px; font-weight: 800; text-align: left; text-transform: uppercase; }
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 15px; margin-bottom: 25px; }
        .player-card { background: linear-gradient(135deg, #181818 0%, #0d0d0d 100%); border: 1px solid #2c2c2c; border-radius: 16px; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-bottom: 3px solid #d4af37; }
        .player-card:hover { transform: translateY(-8px); border-color: #d4af37; box-shadow: 0 12px 25px rgba(212, 175, 55, 0.3); }
        .ovr-badge { position: absolute; top: 12px; left: 15px; background: linear-gradient(135deg, #d4af37, #aa8513); color: #000; font-weight: 900; font-size: 1.1rem; padding: 2px 7px; border-radius: 6px; }
        .player-card .p-num { font-size: 1.4rem; font-weight: 900; color: rgba(212, 175, 55, 0.25); position: absolute; top: 12px; right: 15px; }
        .player-card .p-icon { font-size: 2.2rem; margin: 15px 0 10px; }
        .player-card .p-name { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .player-skills { width: 100%; border-top: 1px solid #222; padding-top: 10px; display: flex; flex-direction: column; gap: 4px; text-align: left; }
        .skill-line { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; font-weight: 600; }
        .skill-line span:last-child { color: #d4af37; font-weight: 700; }

        footer { margin-top: 70px; font-size: 0.85rem; color: #444; border-top: 1px solid #222; padding: 35px 10px; line-height: 1.6; text-align: center; }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
